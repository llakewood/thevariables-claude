name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Create .env
        run: |
          cat <<EOF > .env
          WEB3FORMS_ACCESS_KEY=${{ secrets.WEB3FORMS_ACCESS_KEY }}
          FORM_REDIRECT_URL=${{ secrets.FORM_REDIRECT_URL }}
          CONTACT_EMAIL=${{ secrets.CONTACT_EMAIL }}
          SITE_URL=${{ secrets.SITE_URL }}
          EOF

      - name: Build site
        run: npm run build:all

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude '.env.example' \
            --exclude 'node_modules' \
            --exclude 'config.template.js' \
            --exclude 'build.js' \
            --exclude 'build-archive.js' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'CLAUDE.md' \
            --exclude 'api/config.php' \
            --exclude 'api/service-account.json' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/thevariables.com/
